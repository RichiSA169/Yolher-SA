<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi primera web</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f6f8;
        }
        .card {
            margin: 50px auto;
            padding: 30px;
            width: 300px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            background: #0077ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Hola mundo 🌎</h1>
    <p>Esta es mi primera página web</p>
    <button onclick="saludar()">Haz clic</button>
</div>

<script>
function saludar() {
    alert("¡Bienvenido a mi web!");
}
</script>

</body>
</html>
